<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Triple - Rich Rolon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; background: #e9ecef; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        h2 { color: #0056b3; margin-bottom: 5px; }
        .grid-uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .upload-card { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .upload-card strong { font-size: 0.8em; color: #555; }
        
        .upload-wrapper { position: relative; width: 100%; height: 100px; border: 1px dashed #007bff; border-radius: 5px; margin-top: 5px; overflow: hidden; background-color: #fff; display: flex; align-items: center; justify-content: center; }
        .esquema { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.2; }
        .preview-img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; z-index: 5; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer; }
        
        .controls { text-align: left; background: #fff3cd; padding: 15px; border-radius: 10px; }
        select, button { width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; border: 1px solid #ccc; font-size: 16px; }
        #generateBtn { background: #28a745; color: white; border: none; cursor: pointer; }
        #generateBtn:disabled { background: #ccc; }
        .bn-filter { filter: grayscale(100%); }
    </style>
</head>
<body>

<div class="container">
    <h2>Impresión Triple (216x330mm)</h2>
    <p style="font-size: 0.8em;">Formato Oficio con espacio publicitario inferior.</p>

    <div class="grid-uploads">
        <div class="upload-card">
            <strong>📸 Fila 1 - Frontal</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_frontal.png');"></div>
                <input type="file" onchange="previewFile(this, 'p1')">
                <img id="p1" class="preview-img">
            </div>
        </div>
        <div class="upload-card">
            <strong>📸 Fila 1 - Posterior</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_posterior.png');"></div>
                <input type="file" onchange="previewFile(this, 'p2')">
                <img id="p2" class="preview-img">
            </div>
        </div>
    </div>

    <div class="grid-uploads">
        <div class="upload-card">
            <strong>📸 Fila 2 - Frontal</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_frontal.png');"></div>
                <input type="file" onchange="previewFile(this, 'p3')">
                <img id="p3" class="preview-img">
            </div>
        </div>
        <div class="upload-card">
            <strong>📸 Fila 2 - Posterior</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_posterior.png');"></div>
                <input type="file" onchange="previewFile(this, 'p4')">
                <img id="p4" class="preview-img">
            </div>
        </div>
    </div>

    <div class="grid-uploads">
        <div class="upload-card">
            <strong>📸 Fila 3 - Frontal</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_frontal.png');"></div>
                <input type="file" onchange="previewFile(this, 'p5')">
                <img id="p5" class="preview-img">
            </div>
        </div>
        <div class="upload-card">
            <strong>📸 Fila 3 - Posterior</strong>
            <div class="upload-wrapper">
                <div class="esquema" style="background-image: url('esquema_posterior.png');"></div>
                <input type="file" onchange="previewFile(this, 'p6')">
                <img id="p6" class="preview-img">
            </div>
        </div>
    </div>

    <div class="controls">
        <label><b>Modo de Color:</b></label>
        <select id="colorMode">
            <option value="color">A Color</option>
            <option value="bw">Blanco y Negro</option>
        </select>
        <button id="generateBtn" disabled>Generar PDF Triple</button>
    </div>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const images = { p1:null, p2:null, p3:null, p4:null, p5:null, p6:null };
    
    // URL DE TU IMAGEN FIJA (BANNER INFERIOR)
    // Puedes poner una URL de internet o el nombre de un archivo en tu GitHub
    const footerImageUrl = "tu_banner_inferior.png"; 

    function previewFile(input, id) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById(id);
            img.src = e.target.result;
            img.style.display = 'block';
            images[id] = e.target.result;
            checkReady();
        };
        reader.readAsDataURL(file);
    }

    function checkReady() {
        // Habilitar si al menos el primer par está cargado (o todos, según prefieras)
        if (images.p1 && images.p2) document.getElementById('generateBtn').disabled = false;
    }

    async function processBW(base64) {
        return new Promise(res => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('procCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0,0,canvas.width,canvas.height);
                for(let i=0; i<data.data.length; i+=4) {
                    const g = data.data[i]*0.3 + data.data[i+1]*0.59 + data.data[i+2]*0.11;
                    data.data[i] = data.data[i+1] = data.data[i+2] = g;
                }
                ctx.putImageData(data, 0,0);
                res(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = base64;
        });
    }

    document.getElementById('generateBtn').onclick = async function() {
        this.innerText = "Procesando...";
        const isBW = document.getElementById('colorMode').value === 'bw';
        const { jsPDF } = window.jspdf;
        
        // Tamaño personalizado Oficio (216x330mm)
        const doc = new jsPDF('p', 'mm', [216, 330]);
        
        const w = 85; const h = 55;
        const xStart = 25; // Borde izquierdo 25mm
        const yTop = 20;   // Borde superior 20mm
        const gapX = 6;    // Entre fotos 6mm
        const gapY = 15;   // Entre filas 15mm

        const filas = [
            {f: images.p1, b: images.p2},
            {f: images.p3, b: images.p4},
            {f: images.p5, b: images.p6}
        ];

        for (let i = 0; i < filas.length; i++) {
            if (filas[i].f && filas[i].b) {
                let imgF = isBW ? await processBW(filas[i].f) : filas[i].f;
                let imgB = isBW ? await processBW(filas[i].b) : filas[i].b;
                let yPos = yTop + (i * (h + gapY));
                
                doc.addImage(imgF, 'JPEG', xStart, yPos, w, h);
                doc.addImage(imgB, 'JPEG', xStart + w + gapX, yPos, w, h);
            }
        }

        // AGREGAR IMAGEN FIJA INFERIOR (175 x 100 mm)
        // Posición: 25mm izq, 10mm del borde inferior (330 - 100 - 10 = 220)
        try {
            // Nota: La imagen debe permitir CORS si es externa
            doc.addImage(footerImageUrl, 'PNG', 25, 220, 175, 100);
        } catch (e) {
            console.log("No se pudo cargar la imagen fija del editor.");
        }

        // Manejo para iPhone
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.href = doc.output('bloburl');
        } else {
            doc.save("impresion_triple.pdf");
        }
        this.innerText = "Generar PDF Triple";
    };
</script>
</body>
</html>
